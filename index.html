<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyper2 | Metin2 PvP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cinzel', serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* HERO */
.hero{
    width:100%;
    height:100vh;
    background:
    linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    padding-left:80px;
    position:relative;
}

.hero-content{
    max-width:600px;
}

.hero h1{
    font-size:90px;
    color:red;
    text-shadow:0 0 30px red;
}

.hero p{
    font-size:22px;
    margin-top:20px;
    color:#ddd;
}

/* BUTTONS */
.btns{
    margin-top:40px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    margin-right:15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn-red{
    background:red;
    color:white;
    box-shadow:0 0 20px red;
}

.btn-dark{
    border:2px solid red;
    color:white;
}

.btn:hover{
    transform:scale(1.1);
}

/* SECTION */
section{
    padding:100px 20px;
    text-align:center;
}

.title{
    font-size:45px;
    color:red;
    margin-bottom:50px;
}

/* FEATURES */
.features{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:#111;
    padding:30px;
    border-radius:15px;
    border:1px solid rgba(255,0,0,0.3);
}

.card h3{
    color:red;
    margin-bottom:15px;
}

/* GALLERY */
.gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.gallery img{
    width:350px;
    border-radius:15px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    border-top:1px solid rgba(255,0,0,0.2);
    color:#777;
}

</style>

</head>

<body>

<div class="hero">

<div class="hero-content">

<h1>SKYPER2</h1>

<p>Metin2 PvP | Yeni Nesil Savaş Deneyimi</p>

<div class="btns">

<a href="#" class="btn btn-red">KAYIT OL</a>
<a href="#" class="btn btn-dark">CLIENT İNDİR</a>

</div>

</div>

</div>

<section>

<div class="title">SUNUCU ÖZELLİKLERİ</div>

<div class="features">

<div class="card">
<h3>⚔ PvP Sistemi</h3>
<p>Dengeli ve rekabetçi savaş sistemi.</p>
</div>

<div class="card">
<h3>🔥 Bosslar</h3>
<p>Günlük etkinlik ve boss savaşları.</p>
</div>

<div class="card">
<h3>🏆 Lonca Savaşları</h3>
<p>Gerçek PvP rekabeti.</p>
</div>

</div>

</section>

<section>

<div class="title">OYUN GÖRSELLERİ</div>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070">
<img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?q=80&w=2070">

</div>

</section>

<footer>
© 2026 Skyper2 - Tüm Hakları Saklıdır
</footer>

</body>
</html>
