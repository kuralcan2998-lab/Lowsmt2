<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyper2 Metin2 PvP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow-x:hidden;
}

/* HERO BACKGROUND SLIDER */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:60px;
background-size:cover;
background-position:center;
animation:bg 12s infinite;
}

@keyframes bg{
0%{background-image:url('https://images.unsplash.com/photo-1542751371-adc38448a05e');}
50%{background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420');}
100%{background-image:url('https://images.unsplash.com/photo-1493711662062-fa541adb3fc8');}
}

.hero h1{
font-size:80px;
color:red;
text-shadow:0 0 20px red;
}

.hero p{
font-size:22px;
color:#ddd;
}

/* BUTTONS */
.btn{
display:inline-block;
padding:15px 30px;
margin:10px;
text-decoration:none;
color:white;
border-radius:10px;
font-weight:bold;
}

.red{background:red;}
.dark{border:2px solid red;}

/* FEATURES */
.section{
padding:80px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.card{
width:280px;
background:#111;
padding:25px;
border-radius:15px;
border:1px solid red;
}

/* ONLINE COUNTER */
.online{
font-size:30px;
color:lime;
margin-top:20px;
}

/* DISCORD */
.discord{
padding:60px;
text-align:center;
}

iframe{
border-radius:15px;
}

/* REGISTER MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

/* ANIMATED EFFECT */
.glow{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px red;}
to{text-shadow:0 0 30px red;}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<div>
<h1 class="glow">SKYPER2</h1>
<p>Metin2 PvP - Gerçek Savaş Deneyimi</p>

<div class="online">Online Oyuncu: <span id="online">153</span></div>

<br>

<a class="btn red" onclick="openReg()">KAYIT OL</a>
<a class="btn dark" href="https://example.com/client.zip">CLIENT İNDİR</a>

</div>

</div>

<!-- FEATURES -->
<div class="section">
<h2>ÖZELLİKLER</h2>

<div class="cards">

<div class="card">
<h3>⚔ PvP Sistem</h3>
<p>Dengeli savaş sistemi</p>
</div>

<div class="card">
<h3>🔥 Boss</h3>
<p>Günlük etkinlikler</p>
</div>

<div class="card">
<h3>🏆 Lonca</h3>
<p>Gerçek PvP savaşları</p>
</div>

</div>
</div>

<!-- GALLERY -->
<div class="section">
<h2>GÖRSELLER</h2>

<div class="cards">

<img width="300" src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<img width="300" src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<img width="300" src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">

</div>

</div>

<!-- DISCORD -->
<div class="discord">
<h2>DISCORD</h2>

<iframe src="https://discord.com/widget?id=000000000000&theme=dark"
width="350" height="500"></iframe>

</div>

<!-- REGISTER MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h2>Kayıt Ol</h2>

<input placeholder="Kullanıcı Adı">
<input placeholder="Şifre">

<br>

<button class="btn red">KAYDOL</button>
<br><br>

<button class="btn dark" onclick="closeReg()">Kapat</button>

</div>

</div>

<script>

// FAKE ONLINE SYSTEM
setInterval(()=>{
document.getElementById("online").innerText =
150 + Math.floor(Math.random()*50);
},3000);

// REGISTER
function openReg(){
document.getElementById("modal").style.display="flex";
}

function closeReg(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
