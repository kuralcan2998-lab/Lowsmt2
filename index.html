<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Skyper2 - Metin2 Panel</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow-x:hidden;
}

/* 3D BACKGROUND EFFECT */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e');
background-size:cover;
filter:brightness(0.3);
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* TOP BAR */
.top{
position:relative;
padding:20px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.7);
border-bottom:1px solid red;
}

.logo{
color:red;
font-size:30px;
}

/* SLIDER */
.slider{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.char{
width:300px;
height:400px;
background:#111;
border:2px solid red;
border-radius:15px;
text-align:center;
overflow:hidden;
}

.char img{
width:100%;
height:300px;
object-fit:cover;
}

.char h3{
color:red;
}

/* PLAYER LIST */
.panel{
display:flex;
justify-content:center;
gap:40px;
margin-top:50px;
}

.box{
width:300px;
background:#111;
padding:20px;
border-radius:15px;
border:1px solid red;
}

.rank{
color:lime;
}

/* GM PANEL */
.gm{
background:#1a1a1a;
padding:20px;
margin-top:50px;
border-top:2px solid red;
}

/* SOUND BUTTON */
button{
padding:10px 20px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="top">
<div class="logo">SKYPER2 PANEL</div>
<button onclick="play()">🔊 Intro Ses</button>
</div>

<!-- CHAR SLIDER -->
<div class="slider">

<div class="char">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<h3>WARRIOR</h3>
</div>

<div class="char">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<h3>NINJA</h3>
</div>

</div>

<!-- PLAYER LIST -->
<div class="panel">

<div class="box">
<h2>Oyuncular</h2>
<p>Player1 - Level 99</p>
<p>Player2 - Level 85</p>
<p>Player3 - Level 70</p>
</div>

<div class="box">
<h2>Rank</h2>
<p class="rank">#1 Slayer</p>
<p>#2 Assassin</p>
<p>#3 Warrior</p>
</div>

</div>

<!-- GM PANEL -->
<div class="gm">
<h2>GM PANEL</h2>
<p>Ban Player | Item Ver | Teleport | Event Başlat</p>
</div>

<!-- AUDIO -->
<audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

function play(){
document.getElementById("audio").play();
}

</script>

</body>
</html>
